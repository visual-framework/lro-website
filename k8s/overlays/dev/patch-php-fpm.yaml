apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-fpm
spec:
  replicas: 1 # Add one replica for dev
  selector:
    matchLabels:
      component: php-fpm
  template:
    metadata:
      labels:
        component: php-fpm
    spec:
      containers:
        - name: php-fpm
          env:
            - name: ENV
              value: "dev"
            - name: DATACENTER
              value: "hh"
            - name: DB_DATACENTER
              value: "pg"
            - name: SMTP_HOST
              value: "hh-smtp.ebi.ac.uk"
            - name: SMTP_PORT
              value: "25"
            - name: HTTP_PROXY
              value: "http://pg-wwwcache.ebi.ac.uk:3128"
            - name: HTTPS_PROXY
              value: "http://pg-wwwcache.ebi.ac.uk:3128"
