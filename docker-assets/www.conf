[global]
error_log = /proc/self/fd/2
log_level = notice
daemonize = no

[www]
user = k8s_user
group = wd_pub

listen = 9000

pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 2
pm.max_spare_servers = 10
request_terminate_timeout = 60s
access.log = /proc/self/fd/1
catch_workers_output = yes
clear_env = no
env[ENV] = $ENV
